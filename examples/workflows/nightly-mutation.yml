# Add to .github/workflows/move-mutation.yml in your Move repo
# Layer 1 + Layer 2 — requires sui CLI, runs nightly
name: move-mutation
on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:       # manual trigger
jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sui CLI
        run: |
          curl -fsSL -o sui.tgz https://github.com/MystenLabs/sui/releases/download/mainnet-v1.74.1/sui-mainnet-v1.74.1-ubuntu-x86_64.tgz
          tar xzf sui.tgz
          sudo mv sui /usr/local/bin/
          rm sui.tgz
          sui --version
      - uses: mehvetero/move-test-gen@v1.1.0
        with:
          sources: sources
          tests: tests
          mutate: 'true'
